<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="制作したプログラミング作品のポートフォリオ"
    />
    <title>ポートフォリオ | 制作作品一覧</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <p class="site-header__eyebrow">Portfolio</p>
        <h1 class="site-header__title">制作作品</h1>
        <p class="site-header__lead">
          就職活動向けにまとめた、これまでに取り組んだプログラミング作品です。
          各カードから概要とリポジトリをご確認いただけます。
        </p>
      </div>
    </header>

    <main class="main">
      <section class="projects" aria-label="プロジェクト一覧">
        <div class="tag-filter" aria-label="タグで絞り込み">
          <h2 class="tag-filter__title">タグで絞り込む</h2>
          <p class="tag-filter__hint">
            複数選択できます。選択したタグのいずれかを含む作品が表示されます。未選択の場合はすべて表示されます。
          </p>
          <div id="tag-filter-options" class="tag-filter__options"></div>
          <p id="filter-status" class="tag-filter__status" aria-live="polite"></p>
        </div>

        <div id="projects-grid" class="projects-grid"></div>
        <p id="no-results" class="no-results" hidden>
          選択したタグに一致する作品がありません。
        </p>
      </section>
    </main>

    <div
      id="project-modal"
      class="modal"
      hidden
      aria-hidden="true"
    >
      <div class="modal__backdrop" data-modal-close tabindex="-1"></div>
      <div
        class="modal__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <button
          type="button"
          class="modal__close"
          data-modal-close
          aria-label="閉じる"
        >
          <span aria-hidden="true">&times;</span>
        </button>
        <div class="modal__content">
          <div class="modal__top">
            <ul
              id="modal-tags"
              class="modal__tags"
              aria-label="使用技術"
            ></ul>
            <h2 id="modal-title" class="modal__title"></h2>
            <a
              id="modal-github"
              class="modal__github"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
            >
              <svg
                class="modal__github-icon"
                viewBox="0 0 16 16"
                width="16"
                height="16"
                aria-hidden="true"
              >
                <path
                  fill="currentColor"
                  d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.55 7.55 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"
                />
              </svg>
              <span>GitHub で見る</span>
            </a>
            <dl class="modal__meta">
              <dt>開発期間</dt>
              <dd id="modal-dev-time"></dd>
              <dt>開発人数</dt>
              <dd id="modal-developer-count"></dd>
              <dt>評価</dt>
              <dd id="modal-grade"></dd>
            </dl>
            <div class="modal__image-wrap">
              <img
                id="modal-image"
                class="modal__image"
                src=""
                alt=""
                width="800"
                height="450"
              />
            </div>
          </div>
          <p id="modal-description" class="modal__description"></p>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <p>
        <a
          id="footer-github"
          href="https://github.com/YOUR_USERNAME"
          target="_blank"
          rel="noopener noreferrer"
          >GitHub</a
        >
      </p>
    </footer>

    <script src="js/projects.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
